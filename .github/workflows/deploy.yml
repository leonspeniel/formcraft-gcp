name: Build and Deploy Full-Stack Form Builder

on:
  push:
    branches:
      - main

env:
  GCP_REGION: us-central1
  ARTIFACT_REPOSITORY: form-builder-repo

jobs:
  build-and-deploy:
    name: Build and Deploy to GCP VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Backend Image
        run: |
          BACKEND_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/backend"
          docker build -t $BACKEND_TAG:latest -t $BACKEND_TAG:${{ github.sha }} ./backend
          docker push $BACKEND_TAG:latest
          docker push $BACKEND_TAG:${{ github.sha }}

      - name: Build and Push Frontend Image
        run: |
          FRONTEND_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/frontend"
          docker build -t $FRONTEND_TAG:latest -t $FRONTEND_TAG:${{ github.sha }} ./frontend
          docker push $FRONTEND_TAG:latest
          docker push $FRONTEND_TAG:${{ github.sha }}

      - name: Deploy to GCP Compute Engine VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # 1. Authenticate with Artifact Registry inside VM
            gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
            
            # 2. Pull down latest microservice containers
            docker pull ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/backend:latest
            docker pull ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/frontend:latest
            
            # 3. Create deployment directory if missing and write/copy compose orchestration
            mkdir -p ~/app
            cd ~/app
            
            # We copy or recreate the production-compliant compose file on the VM
            cat << 'EOF' > docker-compose.yml
            version: '3.8'

            services:
              db:
                image: postgres:15-alpine
                container_name: production-db
                restart: always
                environment:
                  POSTGRES_USER: ${DATABASE_USER:-form_user}
                  POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secure_production_password}
                  POSTGRES_DB: ${DATABASE_NAME:-form_db}
                volumes:
                  - pgdata:/var/lib/postgresql/data

              backend:
                image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/backend:latest
                container_name: production-backend
                restart: always
                ports:
                  - "8000:8000"
                environment:
                  - DATABASE_URL=postgresql://${DATABASE_USER:-form_user}:${DATABASE_PASSWORD:-secure_production_password}@db:5432/${DATABASE_NAME:-form_db}
                  - JWT_SECRET=${JWT_SECRET}
                  - JWT_ALGORITHM=HS256
                  - ACCESS_TOKEN_EXPIRE_MINUTES=1440
                depends_on:
                  - db

              frontend:
                image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/frontend:latest
                container_name: production-frontend
                restart: always
                ports:
                  - "80:3000"
                environment:
                  - NEXT_PUBLIC_API_URL=http://${{ secrets.VM_HOST }}:8000
                depends_on:
                  - backend

            volumes:
              pgdata:
            EOF

            # 4. Gracefully force-recreate running services
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            DATABASE_USER="${{ secrets.DATABASE_USER }}" \
            DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
            DATABASE_NAME="${{ secrets.DATABASE_NAME }}" \
            docker compose up -d --force-recreate
