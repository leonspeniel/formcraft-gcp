version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: form-builder-db
    restart: always
    environment:
      POSTGRES_USER: form_user
      POSTGRES_PASSWORD: secure_dev_password
      POSTGRES_DB: form_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: form-builder-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://form_user:secure_dev_password@db:5432/form_db
      - JWT_SECRET=super_secret_local_dev_key_12345
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: form-builder-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
